name: aisteve

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aisteve-ollama
    # Models persist in this volume so we don't re-download them every
    # time the container restarts.
    volumes:
      - ollama-models:/root/.ollama
    # Expose 11434 only inside the docker network by default.
    # Uncomment the ports section to also expose to the host.
    # ports:
    #   - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  aisteve:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aisteve-api
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      # Inside the docker network, ollama is reachable by service name.
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: llama3.1:8b
      OLLAMA_TIMEOUT_SECONDS: "300"
      APP_ENV: production
      LOG_LEVEL: INFO
      # Production deployments should override this with their real origin.
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  ollama-models: